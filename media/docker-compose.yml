  sizarr:
    image: basola21/sizarr:latest
    container_name: sizarr
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - SONARR_URL=http://sonarr:8989
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_URL=http://radarr:7878
      - RADARR_API_KEY=${RADARR_API_KEY}
      - CACHE_PATH=/cache
      - SCHEDULE=0 2 * * *
      - CRF=20
      - USE_GPU=true
    volumes:
      - /data:/data
      - /transcode_cache:/cache
    networks:
      - servarrnetwork
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOWNLOAD_DIR=/downloads
      - YTDL_OPTIONS={"embed_thumbnail":true,"writethumbnail":false,"merge_output_format":"mp4"}
    volumes:
      - /data/youtube:/downloads
    ports:
      - 8081:8081
    networks:
      - servarrnetwork
